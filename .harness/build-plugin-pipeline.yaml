pipeline:
  name: Build Kanboard Plugin
  identifier: build_kanboard_plugin
  projectIdentifier: ${HARNESS_PROJECT}
  orgIdentifier: ${HARNESS_ORG}
  description: Builds and pushes the Kanboard plugin image to GHCR. Run once after setup, and again whenever plugin/ changes.
  tags:
    custom-plugins: ""
  variables:
    - name: github_user
      type: String
      description: GHCR namespace used in the plugin image path
      value: ${GITHUB_USERNAME}
  stages:
    - stage:
        name: Build Plugin
        identifier: Build_Plugin
        description: Builds and pushes ghcr.io/<github_user>/custom-plugins-kanboard, tagged v<sequenceId> and latest.
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: ghcrconn
                    repo: ghcr.io/<+pipeline.variables.github_user>/custom-plugins-kanboard
                    tags:
                      - v<+pipeline.sequenceId>
                      - latest
                    caching: true
                    dockerfile: plugin/Dockerfile
                    context: plugin
                    envVariables:
                      PLUGIN_PLATFORM: linux/amd64,linux/arm64
  properties:
    ci:
      codebase:
        connectorRef: github
        build: <+input>
        sparseCheckout: []
